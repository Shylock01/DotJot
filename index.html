<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>DotJot</title>
  <link rel="icon" type="image/png" href="Graphics/favicon_padded.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Dashboard View -->
  <div id="dashboard-view" class="view active">
    <header class="dashboard-header">
      <img src="Graphics/dotjot_logo_white.png" alt="DotJot Logo" class="dashboard-logo">
      <button class="settings-btn" id="settings-btn" aria-label="Settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div class="dashboard-content">
      <!-- Most Recent Card -->
      <section class="most-recent-section" id="most-recent-container">
        <!-- Injected via JS -->
      </section>

      <!-- Grid of Notes -->
      <section class="notes-grid" id="notes-grid">
        <!-- Injected via JS -->
      </section>
    </div>

    <!-- Global New Note FAB -->
    <button class="fab global-fab elevation-2" id="new-note-btn" aria-label="Create New Note">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    
    <!-- Bottom Gradient Overlay -->
    <div class="dashboard-bottom-gradient"></div>

    <!-- Version Tag -->
    <div class="version-tag">v0.1.11</div>
  </div>

  <!-- Note View (Canvas) -->
  <div id="canvas-view" class="view">
    <!-- Top Left Bookmark / Back Button Banner Tab -->
    <div class="note-banner-tab" id="note-banner-tab">
      <div class="banner-ribbon elevation-3" id="banner-ribbon">
        <button class="banner-back-btn" id="back-to-dashboard-btn" aria-label="Back to Dashboard">
          <!-- Back arrow icon -->
          <svg class="icon-back" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
      </div>
      <div class="banner-title-wrapper" id="banner-title-wrapper">
        <div class="banner-title-panel" id="banner-title-panel">
          <input type="text" id="note-title-input" class="note-title-input" placeholder="Untitled Note" readonly />
        </div>
      </div>
    </div>

    <!-- Pages Viewport — centered in canvas-view, clips to visible pages -->
    <div id="pages-viewport">
      <div id="pages-track">
        <!-- .note-page divs injected by JS -->
      </div>
    </div>

    <!-- Top Center Page Navigator & Zoom Controls -->
    <div class="page-navigator elevation-2">
      <button class="icon-btn" id="prev-page-btn" title="Previous Page">&lt;</button>
      <span id="page-indicator">1 / 1</span>
      <button class="icon-btn" id="next-page-btn" title="Next Page">&gt;</button>
      <span class="nav-divider"></span>
      <button class="icon-btn" id="zoom-out-btn" title="Zoom Out">−</button>
      <button class="icon-btn" id="zoom-reset-btn" title="Reset Zoom">100%</button>
      <button class="icon-btn" id="zoom-in-btn" title="Zoom In">+</button>
    </div>

    <!-- Contextual Properties Toolbar -->
    <div id="properties-toolbar" class="properties-toolbar elevation-3 hidden">
      
      <!-- Text Layout -->
      <div id="prop-layout-text" class="prop-layout hidden">
        <button class="toolbar-icon-btn" id="font-size-btn" data-size="3" title="Font Size">Aa</button>
        
        <button class="toolbar-icon-btn" id="align-btn" data-align="justifyLeft" title="Alignment">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="15" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        
        <div class="prop-divider"></div>
        
        <button class="toolbar-icon-btn" data-command="bold" title="Bold" style="font-weight: bold;">B</button>
        <button class="toolbar-icon-btn" data-command="italic" title="Italic" style="font-style: italic;">I</button>
        <button class="toolbar-icon-btn" data-command="underline" title="Underline" style="text-decoration: underline;">U</button>
        
        <div class="prop-divider"></div>
        
        <button class="toolbar-icon-btn color-toggle-btn" id="text-color-btn" title="Text Color">
          <div class="color-indicator" style="background-color: #1A1A1A;"></div>
        </button>
      </div>

      <!-- Draw Layout -->
      <div id="prop-layout-draw" class="prop-layout hidden">
        <button class="toolbar-icon-btn color-toggle-btn" id="draw-color-btn" title="Draw Color">
          <div class="color-indicator" style="background-color: #1A1A1A;"></div>
        </button>
      </div>

      <!-- Custom Color Popover -->
      <div id="color-popover" class="color-popover hidden elevation-3">
        <div class="color-grid">
          <!-- Swatches generated by JS -->
        </div>
      </div>
      
    </div>

    <!-- Editor Sidebar Container -->
    <div class="editor-sidebar-wrapper">
      <div id="tool-menu" class="tool-menu elevation-3 hidden">
        <div class="tool-menu-inner">
          <button class="tool-btn" data-tool="draw" title="Draw">🖌️</button>
          <button class="tool-btn" data-tool="text" title="Text">T</button>
          <button class="tool-btn" data-tool="rect" title="Rectangle">◻️</button>
          <button class="tool-btn" data-tool="circle" title="Circle">⭕</button>
          <button class="tool-btn" data-tool="line" title="Line">➖</button>
        </div>
      </div>
      <button class="icon-btn elevation-2" id="toggle-tools-btn" title="Toggle Tools">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path>
          <path d="m15 5 4 4"></path>
        </svg>
      </button>
    </div>

    <!-- Bottom Right FAB Cluster -->
    <div class="fab-cluster">
      <button class="fab primary-fab elevation-2" id="add-page-btn" aria-label="Add Page">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>

  </div>

  <!-- Modal Overlay -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-content elevation-3">
      <p id="delete-modal-text">Delete note?</p>
      <div class="modal-actions">
        <button id="cancel-delete-btn" class="modal-btn cancel-btn">Cancel</button>
        <button id="confirm-delete-btn" class="modal-btn confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content elevation-3 settings-content">
      <div class="settings-header">
        <h2 style="color: white;">Settings</h2>
        <button id="close-settings-btn" class="close-modal-btn">✕</button>
      </div>
      
      <div class="settings-section">
        <h3>Account</h3>
        
        <!-- Logged Out State -->
        <div id="auth-logged-out-view" class="auth-buttons-row">
          <button id="show-login-btn" class="primary-btn">Log In</button>
          <button id="show-signup-btn" class="secondary-btn">Sign Up</button>
        </div>

        <!-- Logged In State -->
        <div id="auth-logged-in-view" class="hidden">
          <div class="auth-user-row">
            <input type="text" id="auth-status-text" class="settings-input" readonly />
            <button id="auth-logout-btn" class="secondary-btn" style="width: auto;">Log Out</button>
          </div>
          
          <div id="sync-section" class="settings-subsection">
            <div class="sync-toggle-row">
              <span>Sync</span>
              <label class="toggle-switch">
                <input type="checkbox" id="sync-toggle" disabled>
                <span class="slider round"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal-overlay hidden" style="z-index: 2000;">
    <div class="modal-content elevation-3 settings-content">
      <div class="settings-header">
        <h2 style="color: white;">Log In</h2>
      </div>
      <div class="settings-section">
        <input type="email" id="login-email" placeholder="Username / Email" class="settings-input" />
        <input type="password" id="login-password" placeholder="Password" class="settings-input" />
        <div class="modal-actions" style="margin-top: 16px;">
          <button id="login-cancel-btn" class="modal-btn cancel-btn">Cancel</button>
          <button id="login-confirm-btn" class="modal-btn confirm-btn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Signup Modal -->
  <div id="signup-modal" class="modal-overlay hidden" style="z-index: 2000;">
    <div class="modal-content elevation-3 settings-content">
      <div class="settings-header">
        <h2 style="color: white;">Create Account</h2>
      </div>
      <div class="settings-section">
        <input type="email" id="signup-email" placeholder="Email" class="settings-input" />
        <input type="password" id="signup-password" placeholder="Password" class="settings-input" />
        <div class="modal-actions" style="margin-top: 16px;">
          <button id="signup-cancel-btn" class="modal-btn cancel-btn">Cancel</button>
          <button id="signup-confirm-btn" class="modal-btn confirm-btn">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
